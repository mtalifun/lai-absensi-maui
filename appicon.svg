<?xml version="1.0" encoding="utf-8" ?>
<ContentPage xmlns="http://schemas.microsoft.com/dotnet/2021/maui" xmlns:x="http://schemas.microsoft.com/winfx/2009/xaml" x:Class="LaiAbsensi.Pages.SettingsPage" Title="Setting">
    <VerticalStackLayout Padding="20" Spacing="15">
        <Label Text="Pengaturan" FontSize="22" FontAttributes="Bold"/>
        <Button Text="Export Riwayat ke CSV" Clicked="OnExport" BackgroundColor="#0ea5e9" TextColor="White"/>
        <Button Text="Hapus Data Lokal" Clicked="OnClear" BackgroundColor="#ef4444" TextColor="White"/>
        <Button Text="Logout" Clicked="OnLogout" BackgroundColor="#64748b" TextColor="White"/>
        <Label x:Name="lblInfo" FontSize="12" TextColor="Gray"/>
    </VerticalStackLayout>
</ContentPage>