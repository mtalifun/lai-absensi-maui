name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - run: dotnet workload install maui android
    - run: dotnet restore LaiAbsensi/LaiAbsensi.csproj
    - run: dotnet publish LaiAbsensi/LaiAbsensi.csproj -c Release -f net9.0-android -p:AndroidPackageFormat=apk -o ./publish
    - uses: actions/upload-artifact@v4
      with:
        name: LAI-APK
        path: ./publish/*.apk
